services:
  app: &app
    build:
      dockerfile: docker/Dockerfile
      context: ..
      target: dev
      args:
        USER_ID: ${UID}
        GROUP_ID: ${GID}
    env_file:
      - path: ./dev/.env
      - path: ./dev/override.env
        required: false
    ports:
      - "${DEV_PORT:-80}:80"
    volumes:
      - ../:/app
      - ../../queue:/queue
      - ../../queue-amqp:/queue-amqp
      - ../../queue-redis:/queue-redis
      - ../runtime:/app/runtime
      - caddy_data:/data
      - caddy_config:/config
    tty: true
    depends_on:
      garage:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      valkey:
        condition: service_healthy

  worker:
    <<: *app
    command: ["php", "./yii", "queue:listen"]
    environment:
      QUEUE_DRIVER: "${QUEUE_DRIVER:-sync}"
      DATABASE_DSN: "${DATABASE_DSN:-sqlite:/app/runtime/documents.sqlite}"
      DOCUMENT_STORAGE_DRIVER: "${DOCUMENT_STORAGE_DRIVER:-s3}"
      DOCUMENT_LOCAL_STORAGE_ROOT: "${DOCUMENT_LOCAL_STORAGE_ROOT:-/app/runtime/document-objects}"
      S3_ENDPOINT: "${S3_ENDPOINT:-http://garage:3900}"
      S3_REGION: "${S3_REGION:-garage}"
      S3_BUCKET: "${S3_BUCKET:-documents}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:-GKdemo000000000000000000000000000000}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:-garage-demo-secret-key-000000000000000000000000000000}"
      S3_PATH_STYLE: "${S3_PATH_STYLE:-true}"
      DOCUMENT_PROCESSING_LEASE_SECONDS: "${DOCUMENT_PROCESSING_LEASE_SECONDS:-900}"
      AMQP_HOST: "${AMQP_HOST:-rabbitmq}"
      AMQP_PORT: "${AMQP_PORT:-5672}"
      AMQP_USER: "${AMQP_USER:-guest}"
      AMQP_PASSWORD: "${AMQP_PASSWORD:-guest}"
      AMQP_VHOST: "${AMQP_VHOST:-/}"
      REDIS_HOST: "${REDIS_HOST:-valkey}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      REDIS_TIMEOUT: "${REDIS_TIMEOUT:-3}"
      EXTRACTOR_ADAPTER: "${EXTRACTOR_ADAPTER:-kreuzberg}"
      LLM_ADAPTER: "${LLM_ADAPTER:-llamacpp}"
      LLM_BASE_URL: "${LLM_BASE_URL:-http://llama:8080/v1}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-SmolLM2-135M-Instruct-Q4_K_M}"
    healthcheck:
      disable: true
    ports: []
    profiles: ["worker"]
    depends_on:
      app:
        condition: service_started
      garage:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      valkey:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"

  valkey:
    image: valkey/valkey:8
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    ports:
      - "${VALKEY_PORT:-6379}:6379"

  garage:
    image: dxflrs/garage:v2.3.0
    command: ["/garage", "server", "--single-node", "--default-bucket"]
    environment:
      GARAGE_DEFAULT_ACCESS_KEY: "${S3_ACCESS_KEY:-GKdemo000000000000000000000000000000}"
      GARAGE_DEFAULT_SECRET_KEY: "${S3_SECRET_KEY:-garage-demo-secret-key-000000000000000000000000000000}"
      GARAGE_DEFAULT_BUCKET: "${S3_BUCKET:-documents}"
    ports:
      - "${GARAGE_S3_PORT:-3900}:3900"
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data

  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    environment:
      LLAMA_ARG_HOST: 0.0.0.0
      LLAMA_ARG_PORT: 8080
      LLAMA_ARG_ALIAS: "${LLM_MODEL:-SmolLM2-135M-Instruct-Q4_K_M}"
      LLAMA_ARG_CTX_SIZE: "${LLAMA_CPP_CTX_SIZE:-4096}"
      LLAMA_ARG_N_PARALLEL: "${LLAMA_CPP_PARALLEL:-1}"
      LLAMA_ARG_N_PREDICT: "${LLAMA_CPP_N_PREDICT:-512}"
      LLAMA_ARG_HF_REPO: "${LLAMA_CPP_HF_REPO-bartowski/SmolLM2-135M-Instruct-GGUF:Q4_K_M}"
      LLAMA_ARG_MODEL: "${LLAMA_CPP_MODEL:-}"
      LLAMA_ARG_MODEL_URL: "${LLAMA_CPP_MODEL_URL:-}"
    volumes:
      - llama_cache:/root/.cache/llama.cpp
      - ../models:/models
    profiles: ["llm"]

volumes:
  garage_meta:
  garage_data:
  llama_cache:
