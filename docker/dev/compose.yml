services:
  app: &app
    build:
      dockerfile: docker/Dockerfile
      context: ..
      target: dev
      args:
        USER_ID: ${UID}
        GROUP_ID: ${GID}
    env_file:
      - path: ./dev/.env
      - path: ./dev/override.env
        required: false
    ports:
      - "${DEV_PORT:-80}:80"
    volumes:
      - ../:/app
      - ../runtime:/app/runtime
      - caddy_data:/data
      - caddy_config:/config
    tty: true
    depends_on:
      garage:
        condition: service_started
      rabbitmq:
        condition: service_started
      valkey:
        condition: service_started

  worker:
    <<: *app
    command: ["php", "./yii", "queue:listen"]
    ports: []
    profiles: ["worker"]
    depends_on:
      - app

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"

  valkey:
    image: valkey/valkey:8
    ports:
      - "${VALKEY_PORT:-6379}:6379"

  garage:
    image: dxflrs/garage:v2.3.0
    command: ["/garage", "server", "--single-node", "--default-bucket"]
    environment:
      GARAGE_DEFAULT_ACCESS_KEY: "${S3_ACCESS_KEY:-GKdemo000000000000000000000000000000}"
      GARAGE_DEFAULT_SECRET_KEY: "${S3_SECRET_KEY:-garage-demo-secret-key-000000000000000000000000000000}"
      GARAGE_DEFAULT_BUCKET: "${S3_BUCKET:-documents}"
    ports:
      - "${GARAGE_S3_PORT:-3900}:3900"
    volumes:
      - ./garage/garage.toml:/etc/garage.toml:ro
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data

  ollama:
    image: ollama/ollama
    profiles: ["ollama"]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  garage_meta:
  garage_data:
  ollama_data:
