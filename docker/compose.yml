services:
  app: &appconfig
    environment:
      QUEUE_DRIVER: "${QUEUE_DRIVER:-sync}"
      DATABASE_DSN: "${DATABASE_DSN:-sqlite:/app/runtime/documents.sqlite}"
      DOCUMENT_STORAGE_DRIVER: "${DOCUMENT_STORAGE_DRIVER:-s3}"
      DOCUMENT_LOCAL_STORAGE_ROOT: "${DOCUMENT_LOCAL_STORAGE_ROOT:-/app/runtime/document-objects}"
      S3_ENDPOINT: "${S3_ENDPOINT:-http://garage:3900}"
      S3_REGION: "${S3_REGION:-garage}"
      S3_BUCKET: "${S3_BUCKET:-documents}"
      S3_ACCESS_KEY: "${S3_ACCESS_KEY:-GKdemo000000000000000000000000000000}"
      S3_SECRET_KEY: "${S3_SECRET_KEY:-garage-demo-secret-key-000000000000000000000000000000}"
      S3_PATH_STYLE: "${S3_PATH_STYLE:-true}"
      DOCUMENT_PROCESSING_LEASE_SECONDS: "${DOCUMENT_PROCESSING_LEASE_SECONDS:-900}"
      AMQP_HOST: "${AMQP_HOST:-rabbitmq}"
      AMQP_PORT: "${AMQP_PORT:-5672}"
      AMQP_USER: "${AMQP_USER:-guest}"
      AMQP_PASSWORD: "${AMQP_PASSWORD:-guest}"
      AMQP_VHOST: "${AMQP_VHOST:-/}"
      REDIS_HOST: "${REDIS_HOST:-valkey}"
      REDIS_PORT: "${REDIS_PORT:-6379}"
      REDIS_TIMEOUT: "${REDIS_TIMEOUT:-3}"
      EXTRACTOR_ADAPTER: "${EXTRACTOR_ADAPTER:-kreuzberg}"
      LLM_ADAPTER: "${LLM_ADAPTER:-mock}"
      LLM_BASE_URL: "${LLM_BASE_URL:-http://llama:8080/v1}"
      LLM_API_KEY: "${LLM_API_KEY:-}"
      LLM_MODEL: "${LLM_MODEL:-gemma-3-1b-it-Q4_K_M}"

volumes:
  caddy_data:
  caddy_config:
