services:
  app:
    build:
      dockerfile: docker/Dockerfile
      context: ..
      target: dev
      args:
        USER_ID: ${UID}
        GROUP_ID: ${GID}
    env_file:
      - path: ./test/.env
      - path: ./test/override.env
        required: false
    environment:
      QUEUE_DRIVER: sync
      LLM_ADAPTER: mock
      DATABASE_DSN: sqlite:/app/runtime/test-documents.sqlite
      DOCUMENT_STORAGE_DRIVER: local
      DOCUMENT_LOCAL_STORAGE_ROOT: /app/runtime/test-document-objects
    volumes:
      - ../:/app
      - ../../queue:/queue
      - ../../queue-amqp:/queue-amqp
      - ../../queue-redis:/queue-redis
      - ../runtime:/app/runtime
      - caddy_data:/data
      - caddy_config:/config
    tty: true
